name: Django Docker CI/CD

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Django tests
        run: |
          python manage.py test

      - name: Build Docker image
        run: |
          docker build -t python_docker_app .

      - name: Push to Docker Hub
        run: |
          echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin
          docker tag python_docker_app ${{ secrets.DOCKER_USERNAME }}/python_docker_app:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/python_docker_app:latest

      - name: Deploy to EC2 server
        uses: appleboy/ssh-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            docker pull ${{ secrets.DOCKER_USERNAME }}/python_docker_app:latest
            docker stop python_django_app || true
            docker rm python_django_app || true
            docker run -d -p 8000:8000 --name python_django_app --restart always ${{ secrets.DOCKER_USERNAME }}/python_docker_app:latest
